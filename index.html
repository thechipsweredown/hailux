<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base target="_top">
<title>HaiLux - Quản Lý Công Việc</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222;min-height:100vh}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none;border:1px solid #ddd;border-radius:6px;padding:8px 12px;width:100%}
input:focus,select:focus,textarea:focus{border-color:#4361ee}
a{text-decoration:none;color:inherit}
.hidden{display:none!important}
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
#main{margin-left:220px;flex:1;padding:24px}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-logo h2{font-size:1.3rem;font-weight:700;color:#e94560}
.sidebar-logo p{font-size:0.75rem;color:#aaa;margin-top:2px}
.sidebar-user{padding:12px 20px;font-size:0.85rem;color:#ccc;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-user strong{color:#fff;display:block}
nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#bbb;font-size:0.9rem;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.nav-item.active{background:rgba(233,69,96,0.15);color:#e94560;border-left-color:#e94560}
.nav-item .icon{font-size:1.1rem;width:20px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.1)}
.btn-logout{background:rgba(255,255,255,0.08);color:#ccc;padding:8px 16px;border-radius:6px;font-size:0.85rem;width:100%}
.btn-logout:hover{background:rgba(233,69,96,0.3);color:#fff}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}
.login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:2rem;font-weight:800;color:#e94560}
.login-logo p{color:#888;font-size:0.9rem;margin-top:4px}
.login-tabs{display:flex;margin-bottom:24px;border:1px solid #eee;border-radius:8px;overflow:hidden}
.login-tab{flex:1;padding:10px;text-align:center;font-size:0.9rem;color:#888;cursor:pointer;transition:.2s}
.login-tab.active{background:#e94560;color:#fff;font-weight:600}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.85rem;font-weight:600;color:#555;margin-bottom:6px}
.btn-primary{background:#e94560;color:#fff;padding:12px;border-radius:8px;font-size:1rem;font-weight:600;width:100%;margin-top:8px;transition:.2s}
.btn-primary:hover{background:#c73652}
.login-error{color:#e94560;font-size:0.85rem;margin-top:8px;text-align:center}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-size:1.5rem;font-weight:700;color:#1a1a2e}
.page-header .subtitle{font-size:0.9rem;color:#888;margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:4px solid #4361ee}
.stat-card .stat-value{font-size:2rem;font-weight:700;color:#1a1a2e}
.stat-card .stat-label{font-size:0.85rem;color:#888;margin-top:4px}
.stat-card .stat-sub{font-size:0.8rem;color:#aaa;margin-top:2px}
.stat-card.red{border-left-color:#e94560}
.stat-card.green{border-left-color:#4CAF50}
.stat-card.orange{border-left-color:#FF9800}
.stat-card.blue{border-left-color:#2196F3}
.table-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden}
.table-toolbar{padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid #f0f0f0}
.search-input{max-width:280px;padding:8px 12px;border:1px solid #eee;border-radius:8px;font-size:0.9rem}
.filter-select{max-width:180px;padding:8px 12px;border:1px solid #eee;border-radius:8px;font-size:0.9rem;background:#fff}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:#f8f9ff}
th{padding:12px 16px;text-align:left;font-size:0.82rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 16px;font-size:0.9rem;border-top:1px solid #f5f5f5;vertical-align:middle}
tr:hover td{background:#fafbff}
.td-actions{display:flex;gap:8px;white-space:nowrap}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:0.78rem;font-weight:600;white-space:nowrap}
.badge-overdue{background:#ffeaea;color:#e94560}
.btn{padding:8px 16px;border-radius:8px;font-size:0.88rem;font-weight:500;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-sm{padding:5px 10px;font-size:0.8rem;border-radius:6px}
.btn-blue{background:#4361ee;color:#fff}
.btn-blue:hover{background:#3451d1}
.btn-red{background:#e94560;color:#fff}
.btn-red:hover{background:#c73652}
.btn-green{background:#4CAF50;color:#fff}
.btn-green:hover{background:#43a047}
.btn-outline{background:#fff;border:1px solid #ddd;color:#555}
.btn-outline:hover{border-color:#4361ee;color:#4361ee}
.btn-ghost{background:transparent;color:#888;padding:6px 10px;border-radius:6px}
.btn-ghost:hover{background:#f5f5f5;color:#333}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-lg{max-width:900px}
.modal-header{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:1.1rem;font-weight:700}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.btn-close{background:none;font-size:1.3rem;color:#aaa;line-height:1}
.btn-close:hover{color:#333}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.single{grid-template-columns:1fr}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.form-group{margin-bottom:0}
.form-group label{display:block;font-size:0.83rem;font-weight:600;color:#555;margin-bottom:5px}
textarea{resize:vertical;min-height:80px}
.form-hint{font-size:0.78rem;color:#aaa;margin-top:4px}
.job-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.detail-section{background:#f8f9ff;border-radius:10px;padding:16px}
.detail-section h4{font-size:0.85rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.detail-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.88rem}
.detail-row .label{color:#888}
.detail-row .value{font-weight:500;text-align:right;max-width:60%}
.tasks-section{margin-top:20px}
.tasks-section h4{font-size:0.95rem;font-weight:700;color:#1a1a2e;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.task-item{background:#f8f9ff;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1px solid #eee;transition:.2s}
.task-item:hover{border-color:#4361ee;background:#f0f4ff}
.task-order{width:28px;height:28px;border-radius:50%;background:#4361ee;color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0}
.task-info{flex:1}
.task-name{font-weight:600;font-size:0.92rem}
.task-meta{font-size:0.8rem;color:#888;margin-top:3px}
.task-actions{display:flex;gap:6px;flex-shrink:0}
.section-title{font-size:1rem;font-weight:700;color:#1a1a2e;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.section-title .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.employee-task-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:4px solid #ddd;cursor:pointer;transition:.2s}
.employee-task-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);transform:translateY(-1px)}
.employee-task-card.in-progress{border-left-color:#FF9800}
.employee-task-card.upcoming{border-left-color:#4361ee}
.employee-task-card.done{border-left-color:#4CAF50;opacity:.7}
.employee-task-card.blocked{border-left-color:#ddd;opacity:.6}
.etc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.etc-name{font-weight:600;font-size:0.95rem}
.etc-job{font-size:0.82rem;color:#888;margin-bottom:4px}
.etc-deadline{font-size:0.8rem;color:#888}
.etc-deadline.overdue{color:#e94560;font-weight:600}
.images-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:12px}
.img-thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:#f0f0f0;cursor:pointer}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb .del-img{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border-radius:50%;width:22px;height:22px;font-size:0.7rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.img-thumb:hover .del-img{opacity:1}
.settings-section{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:20px}
.settings-section h3{font-size:1rem;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:0.9rem}
.settings-row:last-child{border-bottom:none}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag-item{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:0.82rem;background:#f0f0f0;color:#333}
.tag-item .dot{width:8px;height:8px;border-radius:50%}
.tag-item .rm{cursor:pointer;color:#aaa;font-size:0.9rem;line-height:1}
.tag-item .rm:hover{color:#e94560}
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:0.88rem;animation:slideIn .3s ease;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.toast.success{border-left:4px solid #4CAF50}
.toast.error{border-left:4px solid #e94560}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:#aaa;font-size:0.9rem;gap:8px}
.spinner{width:20px;height:20px;border:2px solid #eee;border-top-color:#4361ee;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.money{font-family:monospace;font-weight:600}
.empty-state{text-align:center;padding:40px;color:#aaa}
.empty-state .icon{font-size:2.5rem;margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:0.8rem;background:#f0f2f5;color:#555}
.divider{height:1px;background:#f0f0f0;margin:16px 0}
.text-muted{color:#aaa;font-size:0.85rem}
.fw-600{font-weight:600}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>HaiLux</h1>
      <p>Hệ thống quản lý công việc</p>
    </div>
    <div class="login-tabs">
      <div class="login-tab active" id="tab-btn-manager">Quản lý</div>
      <div class="login-tab" id="tab-btn-employee">Nhân viên</div>
    </div>
    <div id="tab-manager">
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="manager-password" placeholder="Nhập mật khẩu...">
      </div>
      <button class="btn-primary" id="btn-login-manager">Đăng nhập</button>
      <p class="login-error hidden" id="manager-error">Mật khẩu không đúng</p>
    </div>
    <div id="tab-employee" class="hidden">
      <div class="form-group">
        <label>Chọn tên của bạn</label>
        <select id="employee-select">
          <option value="">-- Chọn nhân viên --</option>
        </select>
      </div>
      <button class="btn-primary" id="btn-login-employee">Vào xem việc của tôi</button>
      <p class="login-error hidden" id="employee-error">Vui lòng chọn tên</p>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="sidebar">
    <div class="sidebar-logo">
      <h2>HaiLux</h2>
      <p>Quản lý công việc</p>
    </div>
    <div class="sidebar-user">
      <span class="text-muted">Đăng nhập với</span>
      <strong id="sidebar-username">—</strong>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">⬅ Đăng xuất</button>
    </div>
  </div>
  <div id="main">
    <div id="page-dashboard" class="hidden"></div>
    <div id="page-jobs" class="hidden"></div>
    <div id="page-mytasks" class="hidden"></div>
    <div id="page-settings" class="hidden"></div>
  </div>
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
// Catch any JS error and show on screen
window.onerror = function(msg, src, line, col, err) {
  var d = document.createElement('div');
  d.style = 'position:fixed;top:0;left:0;right:0;background:#e94560;color:#fff;padding:12px;font-size:13px;z-index:99999;word-break:break-all';
  d.textContent = 'JS ERROR: ' + msg + ' (line ' + line + ')';
  document.body.appendChild(d);
};

// ===== STATE =====
const S = {
  role: null,
  user: null,
  page: null,
  data: { users:[], statuses:[], taskTemplates:[], settings:[], jobs:[] }
};

// ===== EVENT DELEGATION =====
// All dynamic HTML uses data-action="fnName" data-p1="..." data-p2="..."
// Click bubbles up to document, dispatcher calls the right function.
const ACTIONS = {};

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  if (ACTIONS[action]) {
    e.stopPropagation();
    const params = [];
    let i = 1;
    while (el.dataset['p' + i] !== undefined) { params.push(el.dataset['p' + i]); i++; }
    ACTIONS[action](...params);
  }
});

// ===== INIT =====
function initApp() {
  document.getElementById('tab-btn-manager').addEventListener('click', () => switchLoginTab('manager'));
  document.getElementById('tab-btn-employee').addEventListener('click', () => switchLoginTab('employee'));
  document.getElementById('btn-login-manager').addEventListener('click', loginManager);
  document.getElementById('btn-login-employee').addEventListener('click', loginEmployee);
  document.getElementById('btn-logout').addEventListener('click', logout);
  document.getElementById('manager-password').addEventListener('keydown', e => { if (e.key === 'Enter') loginManager(); });

  callServer('getInitialData').then(function(d) {
    S.data.users = d.users || [];
    S.data.statuses = d.statuses || [];
    S.data.taskTemplates = d.taskTemplates || [];
    S.data.settings = d.settings || [];
    populateEmployeeSelect();
  }).catch(function(e) {
    console.error('getInitialData failed:', e);
    showToast('Lỗi kết nối server: ' + (e.message || e), 'error');
  });
}

// Apps Script iframe: dùng window.onload thay DOMContentLoaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}

function populateEmployeeSelect() {
  const sel = document.getElementById('employee-select');
  S.data.users.filter(u => u.role === 'employee').forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = u.name;
    sel.appendChild(opt);
  });
}

// ===== AUTH =====
function switchLoginTab(tab) {
  document.getElementById('tab-btn-manager').classList.toggle('active', tab === 'manager');
  document.getElementById('tab-btn-employee').classList.toggle('active', tab === 'employee');
  document.getElementById('tab-manager').classList.toggle('hidden', tab !== 'manager');
  document.getElementById('tab-employee').classList.toggle('hidden', tab !== 'employee');
}

async function loginManager() {
  const pw = document.getElementById('manager-password').value;
  const ok = await callServer('verifyManagerPassword', pw);
  if (ok) {
    S.role = 'manager';
    S.user = { name: 'Quản lý', role: 'manager' };
    enterApp();
  } else {
    document.getElementById('manager-error').classList.remove('hidden');
  }
}

function loginEmployee() {
  const id = document.getElementById('employee-select').value;
  if (!id) { document.getElementById('employee-error').classList.remove('hidden'); return; }
  S.role = 'employee';
  S.user = S.data.users.find(u => u.id === id);
  enterApp();
}

function enterApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sidebar-username').textContent = S.user.name;
  buildSidebar();
  navigate(S.role === 'manager' ? 'dashboard' : 'mytasks');
}

function logout() {
  S.role = null; S.user = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('manager-password').value = '';
  document.getElementById('manager-error').classList.add('hidden');
}

// ===== NAVIGATION =====
const MANAGER_MENU = [
  { id:'dashboard', icon:'📊', label:'Dashboard' },
  { id:'jobs',      icon:'👜', label:'Công việc' },
  { id:'settings',  icon:'⚙️', label:'Cài đặt' },
];
const EMPLOYEE_MENU = [{ id:'mytasks', icon:'✅', label:'Việc của tôi' }];

function buildSidebar() {
  const menu = S.role === 'manager' ? MANAGER_MENU : EMPLOYEE_MENU;
  document.getElementById('sidebar-nav').innerHTML = menu.map(m =>
    `<div class="nav-item" id="nav-${m.id}" data-action="navigate" data-p1="${m.id}">
       <span class="icon">${m.icon}</span>${m.label}
     </div>`).join('');
}

ACTIONS.navigate = function(page) {
  S.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');
  document.querySelectorAll('#main > div').forEach(el => el.classList.add('hidden'));
  const pageEl = document.getElementById('page-' + page);
  if (pageEl) { pageEl.classList.remove('hidden'); renderPage(page); }
};
function navigate(page) { ACTIONS.navigate(page); }

async function renderPage(page) {
  if (page === 'dashboard') await renderDashboard();
  else if (page === 'jobs') await renderJobs();
  else if (page === 'mytasks') await renderMyTasks();
  else if (page === 'settings') await renderSettings();
}

// ===== DASHBOARD =====
async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = loading();
  const stats = await callServer('getDashboardStats');
  const fmt = n => Number(n).toLocaleString('vi-VN') + 'đ';
  el.innerHTML = `
    <div class="page-header"><div><h1>Dashboard</h1><p class="subtitle">Tổng quan công việc</p></div></div>
    <div class="stats-grid">
      <div class="stat-card blue"><div class="stat-value">${stats.jobs.total}</div><div class="stat-label">Tổng số Job</div><div class="stat-sub">${stats.jobs.overdue} quá hạn</div></div>
      <div class="stat-card orange"><div class="stat-value">${stats.tasks.total}</div><div class="stat-label">Tổng số Task</div><div class="stat-sub">${stats.tasks.by_status['Đang làm']||0} đang làm</div></div>
      <div class="stat-card green"><div class="stat-value money">${fmt(stats.revenue.total)}</div><div class="stat-label">Tổng doanh thu</div><div class="stat-sub money" style="color:#4CAF50">${fmt(stats.revenue.completed)} hoàn thành</div></div>
      <div class="stat-card red"><div class="stat-value">${stats.jobs.overdue}</div><div class="stat-label">Job quá hạn</div><div class="stat-sub">Cần xử lý ngay</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div class="table-card" style="padding:20px">
        <h3 style="font-size:.95rem;font-weight:700;margin-bottom:14px">📋 Trạng thái Job</h3>
        ${Object.entries(stats.jobs.by_status).map(([label,count]) => {
          const s = S.data.statuses.find(s => s.entity_type==='job' && s.label===label);

async function renderJobs() {

    </div>
    <div class="table-card">
      <div class="table-toolbar">
        <input class="search-input" id="job-search" type="text" placeholder="Tìm mã / tên / khách hàng...">
        <select class="filter-select" id="job-filter-status">
          <option value="">Tất cả trạng thái</option>
          ${jobStatuses.map(s => `<option value="${s.id}">${s.label}</option>`).join('')}
        </select>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Mã</th><th>Tên SP</th><th>Khách hàng</th><th>Deadline</th><th>Doanh thu</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
        <tbody id="jobs-tbody"></tbody>
      </table></div>
    </div>`;

  document.getElementById('job-filter-status').addEventListener('change', filterJobs);
  renderJobsTable();
}

function filterJobs() {
  jobsFilter.search = document.getElementById('job-search').value.toLowerCase();
  jobsFilter.status = document.getElementById('job-filter-status').value;
  renderJobsTable();
}

function renderJobsTable() {
  const filtered = jobsData.filter(j => {
    const ms = !jobsFilter.search || ['code','name','customer_name'].some(k => (j[k]||'').toLowerCase().includes(jobsFilter.search));
    const mst = !jobsFilter.status || j.status_id === jobsFilter.status;
    return ms && mst;
  });
  const tbody = document.getElementById('jobs-tbody');
  if (!filtered.length) { tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">📭</div>Không có job nào</div></td></tr>`; return; }
  tbody.innerHTML = filtered.map(j => {
    const status = S.data.statuses.find(s => s.id === j.status_id);
    const isOverdue = j.deadline && new Date(j.deadline) < new Date() && status?.label !== 'Hoàn thành';
    return `<tr>
      <td><strong>${j.code||'—'}</strong></td>
      <td>${j.name||'—'}</td>
      <td>${j.customer_name||'—'}</td>
      <td>${j.deadline ? `<span class="${isOverdue?'badge badge-overdue':''}">${fmtDate(j.deadline)}</span>` : '—'}</td>
      <td><span class="money">${j.revenue ? Number(j.revenue).toLocaleString('vi-VN')+'đ' : '—'}</span></td>
      <td>${status ? `<span class="badge" style="background:${status.color}22;color:${status.color}">${status.label}</span>` : '—'}</td>
      <td><div class="td-actions">
        <button class="btn btn-sm btn-outline" data-action="openJobDetail" data-p1="${j.id}">📋 Chi tiết</button>
        <button class="btn btn-sm btn-outline" data-action="openJobModal" data-p1="${j.id}">✏️</button>
        <button class="btn btn-sm btn-ghost" data-action="confirmDeleteJob" data-p1="${j.id}">🗑</button>
      </div></td>
    </tr>`;
  }).join('');
}

async function saveJob(jobId) {
  const data = {
    code: v('f-code'), name: v('f-name'), category: v('f-category'),
    customer_name: v('f-customer-name'), customer_contact: v('f-customer-contact'),
    received_date: v('f-received-date'), deadline: v('f-deadline'),
    revenue: v('f-revenue'), repair_scope: v('f-repair-scope'),
    status_id: v('f-status'), notes: v('f-notes'),
  };
  if (!data.code || !data.name) { showToast('Vui lòng nhập mã và tên sản phẩm', 'error'); return; }
  if (jobId) await callServer('updateJob', jobId, data);
  else await callServer('createJob', data);
  showToast(jobId ? 'Đã cập nhật job' : 'Đã tạo job mới', 'success');
  closeModal();
  renderJobs();
}

async function confirmDeleteJob(jobId) {
  if (!confirm('Xóa job này sẽ xóa tất cả task liên quan. Xác nhận?')) return;
  await callServer('deleteJob', jobId);
  showToast('Đã xóa job', 'success');
  renderJobs();
}

function renderTasksList(tasks, taskStatuses, job) {
  if (!tasks.length) return `<div class="empty-state"><div class="icon">📋</div>Chưa có task nào</div>`;
  return tasks.map((t, i) => {
    const status = taskStatuses.find(s => s.id === t.status_id);
    const assignee = S.data.users.find(u => u.id === t.assignee_id);
    const deadline = t.deadline || job?.deadline;
    const isOverdue = deadline && new Date(deadline) < new Date() && status?.label !== 'Hoàn thành';
    return `<div class="task-item">
      <div class="task-order">${t.order||i+1}</div>
      <div class="task-info">
        <div class="task-name">${t.name||'—'}</div>
        <div class="task-meta">👤 ${assignee?.name||'Chưa phân công'} · ⏰ ${deadline?fmtDate(deadline):'Theo job'}${t.notes?` · 📝 ${t.notes}`:''}</div>
      </div>
      <div class="task-actions">
        ${status?`<span class="badge" style="background:${status.color}22;color:${status.color}">${status.label}</span>`:''}
        <button class="btn btn-sm btn-outline" data-action="openTaskImages" data-p1="${t.id}" data-p2="${t.name}">🖼 ${t.images?.length||0}</button>
        <button class="btn btn-sm btn-outline" data-action="openEditTaskModal" data-p1="${t.id}" data-p2="${job.id}">✏️</button>
        <button class="btn btn-sm btn-ghost" data-action="confirmDeleteTask" data-p1="${t.id}" data-p2="${job.id}">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ===== IMAGES =====
async function handleImageUpload(event, entityType, entityId, gridId) {
  for (const file of event.target.files) {
    showToast('Đang tải ' + file.name + '...');
    const base64 = await fileToBase64(file);
    const img = await callServer('uploadImage', base64, file.type, file.name, entityType, entityId, S.user.name||'', '');
    const grid = document.getElementById(gridId);
    if (grid) { const d = document.createElement('div'); d.innerHTML = imgThumb(img, entityType, entityId); grid.appendChild(d.firstChild); }
    showToast('Đã tải ảnh lên', 'success');
  }
  event.target.value = '';
}

function imgThumb(img, entityType, entityId) {
  const gridId = entityType === 'job' ? 'job-imgs-' + entityId : 'task-img-grid-' + entityId;
  return `<div class="img-thumb" data-action="viewImage" data-p1="${img.drive_url}">
    <img src="${img.drive_url}" loading="lazy">
    <div class="del-img" data-action="deleteImg" data-p1="${img.id}" data-p2="${gridId}" data-p3="${entityType}" data-p4="${entityId}">✕</div>
  </div>`;
}

      <div class="images-grid" id="task-img-grid-${taskId}">

    </div>
    <div class="modal-footer"><button class="btn btn-outline" data-action="closeModal">Đóng</button></div>`);

  document.getElementById('trigger-task-img-' + taskId).addEventListener('click', () => document.getElementById('task-img-input-' + taskId).click());
  document.getElementById('task-img-input-' + taskId).addEventListener('change', e => handleImageUpload(e, 'task', taskId, 'task-img-grid-' + taskId));
}

async function deleteImg(imgId, gridId, entityType, entityId) {
  if (!confirm('Xóa ảnh này?')) return;
  await callServer('deleteImage', imgId);
  const imgs = await callServer('getImages', entityType, entityId);
  const grid = document.getElementById(gridId);
  if (grid) grid.innerHTML = imgs.map(img => imgThumb(img, entityType, entityId)).join('');
  showToast('Đã xóa ảnh', 'success');
}

// ===== MY TASKS (EMPLOYEE) =====
async function renderMyTasks() {
  const el = document.getElementById('page-mytasks');
  el.innerHTML = loading();
  const tasks = await callServer('getEnrichedTasksForAssignee', S.user.id);
  const taskStatuses = S.data.statuses.filter(s => s.entity_type === 'task');
  const groups = {
    in_progress: { label:'Đang làm', dot:'#FF9800', tasks:[] },
    upcoming:    { label:'Sắp đến lượt', dot:'#4361ee', tasks:[] },
    ready:       { label:'Có thể làm', dot:'#4CAF50', tasks:[] },
    blocked:     { label:'Chưa đến lượt', dot:'#ccc', tasks:[] },
    done:        { label:'Đã hoàn thành', dot:'#4CAF50', tasks:[] },
  };
  tasks.forEach(t => { if (groups[t.availability]) groups[t.availability].tasks.push(t); });
  el.innerHTML = `
    <div class="page-header">
      <div><h1>Việc của ${S.user.name}</h1><p class="subtitle">Tổng: ${tasks.length} task</p></div>
      <button class="btn btn-outline" data-action="refreshMyTasks">🔄 Làm mới</button>
    </div>
    ${Object.entries(groups).filter(([,g]) => g.tasks.length).map(([key,g]) => `
      <div class="section-title"><span class="dot" style="background:${g.dot}"></span>${g.label} <span class="chip">${g.tasks.length}</span></div>
      ${g.tasks.map(t => renderEmployeeTaskCard(t, key)).join('')}
    `).join('')}
    ${!tasks.length ? `<div class="empty-state" style="margin-top:60px"><div class="icon">🎉</div><p>Không có task nào được giao</p></div>` : ''}`;
}

ACTIONS.refreshMyTasks = () => renderMyTasks();
ACTIONS.openEmployeeTaskModal = id => openEmployeeTaskModal(id);

function renderEmployeeTaskCard(t, group) {
  const deadline = t.effective_deadline;
  const isOverdue = deadline && new Date(deadline) < new Date() && t.status?.label !== 'Hoàn thành';
  return `<div class="employee-task-card ${group}" data-action="openEmployeeTaskModal" data-p1="${t.id}">
    <div class="etc-header">
      <span class="etc-name">${t.name||'—'}</span>
      ${t.status?`<span class="badge" style="background:${t.status.color}22;color:${t.status.color}">${t.status.label}</span>`:''}
    </div>
    <div class="etc-job">👜 ${t.job?.code||''} ${t.job?.name||'—'}</div>
    <div class="etc-deadline ${isOverdue?'overdue':''}">⏰ ${deadline?fmtDate(deadline):'Không có deadline'}${isOverdue?' · ⚠️ Quá hạn':''}${t.prev_task?` · Sau: ${t.prev_task.name}`:''}</div>
  </div>`;
}

async function openEmployeeTaskModal(taskId) {
  const [task, images] = await Promise.all([
    callServer('getTaskById', taskId),
    callServer('getImages', 'task', taskId)
  ]);
  if (!task) return;
  const taskStatuses = S.data.statuses.filter(s => s.entity_type === 'task');
  const status = taskStatuses.find(s => s.id === task.status_id);
  const doneStatus = taskStatuses.find(s => s.label === 'Hoàn thành');
  const inProgStatus = taskStatuses.find(s => s.label === 'Đang làm');
  showModal(`
    <div class="modal-header"><h3>${task.name}</h3><button class="btn-close" data-action="closeModal">✕</button></div>
    <div class="modal-body">
      ${status?`<div style="margin-bottom:16px"><span class="badge" style="background:${status.color}22;color:${status.color};font-size:.9rem;padding:6px 14px">${status.label}</span></div>`:''}
      ${task.notes?`<div class="detail-section" style="margin-bottom:16px"><h4>Ghi chú từ quản lý</h4><p style="font-size:.88rem;white-space:pre-line">${task.notes}</p></div>`:''}
      <div class="divider"></div>
      <div class="form-group" style="margin-bottom:16px"><label>Ghi chú khi làm</label><textarea id="emp-notes" placeholder="Ghi lại vấn đề, lưu ý...">${task.notes||''}</textarea></div>
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <strong style="font-size:.9rem">🖼 Ảnh evidence (${images.length})</strong>
          <button class="btn btn-sm btn-outline" id="emp-img-trigger">＋ Tải ảnh</button>
        </div>
        <input type="file" id="emp-img-input" accept="image/*" multiple style="display:none">
        <div class="images-grid" id="emp-img-grid">${images.map(img => imgThumb(img, 'task', taskId)).join('')}</div>
      </div>
    </div>
    <div class="modal-footer" style="justify-content:space-between">
      <button class="btn btn-outline" data-action="closeModal">Đóng</button>
      <div style="display:flex;gap:8px">
        ${inProgStatus && status?.label !== 'Đang làm' && status?.label !== 'Hoàn thành' ?
          `<button class="btn btn-outline" style="border-color:#FF9800;color:#FF9800" data-action="empUpdateStatus" data-p1="${taskId}" data-p2="${inProgStatus.id}" data-p3="${task.job_id}">▶ Bắt đầu</button>` : ''}
        ${doneStatus && status?.label !== 'Hoàn thành' ?
          `<button class="btn btn-green" data-action="empUpdateStatus" data-p1="${taskId}" data-p2="${doneStatus.id}" data-p3="${task.job_id}">✓ Hoàn thành</button>` : ''}
        <button class="btn btn-blue" data-action="empSaveNotes" data-p1="${taskId}" data-p2="${task.job_id}">💾 Lưu</button>
      </div>
    </div>`);

  document.getElementById('emp-img-trigger').addEventListener('click', () => document.getElementById('emp-img-input').click());
  document.getElementById('emp-img-input').addEventListener('change', e => handleImageUpload(e, 'task', taskId, 'emp-img-grid'));
}

ACTIONS.empUpdateStatus = async (taskId, statusId, jobId) => {
  await callServer('updateTask', taskId, { status_id: statusId, job_id: jobId });
  showToast('Đã cập nhật trạng thái', 'success');
  closeModal();
  renderMyTasks();
};
ACTIONS.empSaveNotes = async (taskId, jobId) => {
  await callServer('updateTask', taskId, { notes: v('emp-notes'), job_id: jobId });
  showToast('Đã lưu ghi chú', 'success');
  closeModal();
};

// ===== SETTINGS =====
async function renderSettings() {
  const el = document.getElementById('page-settings');
  el.innerHTML = loading();
  const [users, statuses, templates, settings] = await Promise.all([
    callServer('getUsers'), callServer('getStatuses'),
    callServer('getTaskTemplates'), callServer('getSettings')
  ]);
  S.data.users = users; S.data.statuses = statuses; S.data.taskTemplates = templates; S.data.settings = settings;
  const employees = users.filter(u => u.role === 'employee');
  const jobStatuses = statuses.filter(s => s.entity_type === 'job');
  const taskStatuses = statuses.filter(s => s.entity_type === 'task');

  el.innerHTML = `
    <div class="page-header"><div><h1>Cài đặt</h1></div></div>
    <div class="settings-section">
      <h3>🔐 Bảo mật</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="new-password" type="password" placeholder="Mật khẩu mới..." style="max-width:240px">
        <button class="btn btn-blue" id="btn-change-pw">Đổi mật khẩu</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>👥 Nhân viên (${employees.length})</h3>
      ${employees.map(u => `<div class="settings-row">
        <span>${u.name}</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-outline" data-action="toggleRole" data-p1="${u.id}" data-p2="${u.name}" data-p3="${u.role}">${u.role==='manager'?'👑 Manager':'Promote'}</button>
          <button class="btn btn-sm btn-ghost" data-action="deleteUser" data-p1="${u.id}">🗑</button>
        </div>
      </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:12px">
        <input id="new-user-name" placeholder="Tên nhân viên mới..." style="max-width:200px">
        <button class="btn btn-blue" id="btn-add-user">＋ Thêm</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>🏷 Trạng thái Job</h3>
      <div class="tag-list">${jobStatuses.map(s => `<div class="tag-item"><span class="dot" style="background:${s.color}"></span>${s.label}<span class="rm" data-action="deleteStatus" data-p1="${s.id}">✕</span></div>`).join('')}</div>
      <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
        <input id="new-job-status-label" placeholder="Tên trạng thái..." style="max-width:160px">
        <input type="color" id="new-job-status-color" value="#607D8B" style="width:40px;padding:2px;border-radius:4px">
        <button class="btn btn-sm btn-outline" id="btn-add-job-status">＋ Thêm</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>🏷 Trạng thái Task</h3>
      <div class="tag-list">${taskStatuses.map(s => `<div class="tag-item"><span class="dot" style="background:${s.color}"></span>${s.label}<span class="rm" data-action="deleteStatus" data-p1="${s.id}">✕</span></div>`).join('')}</div>
      <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
        <input id="new-task-status-label" placeholder="Tên trạng thái..." style="max-width:160px">
        <input type="color" id="new-task-status-color" value="#607D8B" style="width:40px;padding:2px;border-radius:4px">
        <button class="btn btn-sm btn-outline" id="btn-add-task-status">＋ Thêm</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>📋 Mẫu Task</h3>
      <div class="tag-list">${templates.map(t => `<div class="tag-item">${t.name}<span class="rm" data-action="deleteTemplate" data-p1="${t.id}">✕</span></div>`).join('')}</div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input id="new-tmpl-name" placeholder="Tên task mẫu..." style="max-width:200px">
        <button class="btn btn-sm btn-outline" id="btn-add-tmpl">＋ Thêm</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>🔧 Khởi tạo hệ thống</h3>
      <p class="text-muted" style="margin-bottom:10px">Tạo tất cả sheet, seed dữ liệu mặc định. Chạy 1 lần khi setup lần đầu.</p>
      <button class="btn btn-outline" id="btn-run-setup">▶ Chạy Setup</button>
    </div>`;

  document.getElementById('btn-change-pw').addEventListener('click', async () => {
    const pw = v('new-password'); if (!pw) return;
    await callServer('updateSetting', 'manager_password', pw);

    document.getElementById('new-password').value = '';
  });
  document.getElementById('btn-add-user').addEventListener('click', async () => {
    const name = v('new-user-name').trim(); if (!name) return;
    await callServer('createUser', { name, role:'employee' });
    showToast('Đã thêm nhân viên', 'success'); renderSettings();

  document.getElementById('btn-add-job-status').addEventListener('click', async () => {
    const label = v('new-job-status-label').trim(); if (!label) return;
    const color = v('new-job-status-color');
    await callServer('createStatus', { entity_type:'job', label, color, order: jobStatuses.length + 1 });
    showToast('Đã thêm', 'success'); renderSettings();
  });
  document.getElementById('btn-add-task-status').addEventListener('click', async () => {
    const label = v('new-task-status-label').trim(); if (!label) return;
    const color = v('new-task-status-color');
    await callServer('createStatus', { entity_type:'task', label, color, order: taskStatuses.length + 1 });

  });

  });

    const result = await callServer('setupSheets');
    showToast(result, 'success'); renderSettings();
  });
}

ACTIONS.toggleRole = async (id, name, role) => {
  await callServer('updateUser', id, { role: role === 'manager' ? 'employee' : 'manager' });
  showToast('Đã cập nhật role', 'success'); renderSettings();
};
ACTIONS.deleteUser = async id => {
  if (!confirm('Xóa nhân viên này?')) return;
  await callServer('deleteUser', id); showToast('Đã xóa', 'success'); renderSettings();
};
ACTIONS.deleteStatus = async id => {
  if (!confirm('Xóa trạng thái này?')) return;
  await callServer('deleteStatus', id); showToast('Đã xóa', 'success'); renderSettings();
};
ACTIONS.deleteTemplate = async id => {
  await callServer('deleteTaskTemplate', id); showToast('Đã xóa mẫu', 'success'); renderSettings();
};

// ===== MODAL =====
function showModal(html, isLarge) {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal ${isLarge?'modal-lg':''}">${html}</div>
    </div>`;
  document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target.id === 'modal-overlay') closeModal(); });
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

// ===== TOAST =====
function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ===== SERVER CALLS =====
// IMPORTANT: preserve `runner` as `this` when calling runner[fn]()
// Do NOT use .apply(null) — it breaks google.script.run's proxy
function callServer(fn) {
  const args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function(err) {
        console.error('callServer error [' + fn + ']:', err);
        reject(err);
      });
    runner[fn].apply(runner, args);
  });
}

// ===== UTILS =====
function v(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function loading() { return '<div class="loading"><div class="spinner"></div> Đang tải...</div>'; }
function fmtDate(d) { if (!d) return ''; const dt = new Date(d); return isNaN(dt) ? d : dt.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateInput(d) { if (!d) return ''; const dt = new Date(d); return isNaN(dt) ? '' : dt.toISOString().split('T')[0]; }
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
