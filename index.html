<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222}

.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;margin-bottom:20px}

.btn{padding:8px 16px;border-radius:8px;font-size:.88rem;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.2s}

.img-th{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:#f0f0f0;cursor:pointer}

.set-sec{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
.set-sec h3{font-size:1rem;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}

.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

.tag-it .tdot{width:8px;height:8px;border-radius:50%}
.tag-it .rm{cursor:pointer;color:#aaa;font-size:.9rem}

#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:.88rem;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.ok{border-left:4px solid #4CAF50}
.toast.err{border-left:4px solid #e94560}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:40px;color:#aaa;gap:8px}
.spin{width:20px;height:20px;border:2px solid #eee;border-top-color:#4361ee;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.money{font-family:monospace;font-weight:600}
.empty{text-align:center;padding:40px;color:#aaa}
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:.8rem;background:#f0f2f5;color:#555}
.divider{height:1px;background:#f0f0f0;margin:16px 0}
.muted{color:#aaa;font-size:.85rem}

/* ===== DAG ===== */
.dag-wrap{overflow-x:auto;padding:20px 4px;background:#f8f9ff;border-radius:10px;margin-bottom:20px}
.dag-flow{display:flex;align-items:center;gap:0;min-width:max-content;padding:0 8px}
.dag-node{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;cursor:pointer}
.dag-box{padding:10px 14px;border-radius:10px;font-size:.8rem;font-weight:600;text-align:center;min-width:100px;max-width:130px;border:2px solid transparent;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.dag-box:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.dag-box.done{background:#e8f5e9;border-color:#4CAF50;color:#2e7d32}
.dag-box.in_progress{background:#fff3e0;border-color:#FF9800;color:#e65100}
.dag-box.todo{background:#f5f5f5;border-color:#bdbdbd;color:#757575}
.dag-box.rejected{background:#ffebee;border-color:#f44336;color:#c62828}
.dag-box.pending{background:#f3e5f5;border-color:#9C27B0;color:#6a1b9a}
.dag-name{font-size:.78rem;font-weight:700;line-height:1.3;word-break:break-word;text-align:center}
.dag-assignee{font-size:.72rem;font-weight:400;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.dag-status-dot{width:8px;height:8px;border-radius:50%;margin:0 auto}
.dag-arrow{display:flex;align-items:center;padding:0 4px;color:#bbb;font-size:1.1rem;flex-shrink:0;margin-top:-18px}
.dag-order{font-size:.65rem;color:#aaa;font-weight:400}
.dag-icon{font-size:1rem;line-height:1}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><h1>HaiLux</h1><p>Háŧ tháŧng quášĢn lÃ― cÃīng viáŧc</p></div>

      <div class="form-group"><label>Máš­t khášĐu</label><input type="password" id="inp-pw" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">ÄÄng nháš­p</button>

      <div class="form-group"><label>Cháŧn tÃŠn cáŧ§a bášĄn</label><select id="sel-emp"><option value="">-- Cháŧn nhÃĒn viÃŠn --</option></select></div>
      <button class="btn-primary" onclick="doLoginEmp()">VÃ o xem viáŧc cáŧ§a tÃīi</button>
      <p class="login-error hidden" id="err-emp">Vui lÃēng cháŧn tÃŠn</p>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="sidebar">
    <div class="sidebar-logo"><h2>HaiLux</h2><p>QuášĢn lÃ― cÃīng viáŧc</p></div>
    <div class="sidebar-user" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px"><span class="muted" style="font-size:.8rem;flex-shrink:0">Xin chÃ o,</span><strong id="sb-name" style="font-size:.85rem;overflow:hidden;text-overflow:ellipsis">â</strong></div>
    <nav id="sb-nav"></nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="doLogout()">&#8592; ÄÄng xuášĨt</button></div>

  <div id="main">
    <div id="pg-dashboard" class="hidden"></div>
    <div id="pg-jobs" class="hidden"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  toast('JS Error: ' + msg + ' (line ' + line + ')', 'err');
  console.error(msg, err);
};
window.addEventListener('unhandledrejection', function(e) {
  toast('Async Error: ' + (e.reason && e.reason.message || e.reason), 'err');
  console.error(e.reason);
});

var APP = {
  role: null,
  user: null,
  page: null,
  users: [], statuses: [], taskTemplates: [], settings: [], jobs: [],
  st: function(id) { return (this.statuses||[]).filter(function(s){return s.id===id;})[0] || null; },
  stBy: function(type, label) { return (this.statuses||[]).filter(function(s){return s.entity_type===type&&s.label===label;})[0] || null; },
  stList: function(type) { return (this.statuses||[]).filter(function(s){return s.entity_type===type;}); },
  user_by_id: function(id) { return (this.users||[]).filter(function(u){return u.id===id;})[0] || null; },
  emps: function() { return (this.users||[]).filter(function(u){return u.role==='employee';}); }
};

// ---- INIT ----
window.onload = function() {
  google.script.run
    .withSuccessHandler(function(d) {
      APP.users = d.users || [];
      APP.statuses = d.statuses || [];
      APP.taskTemplates = d.taskTemplates || [];
      APP.settings = d.settings || [];
      APP.categories = d.categories || [];
      var sel = document.getElementById('sel-emp');
      APP.emps().forEach(function(u) {
        var o = document.createElement('option');
        o.value = u.id; o.textContent = u.name; sel.appendChild(o);
      });
    })
    .withFailureHandler(function(e){ toast('Láŧi kášŋt náŧi: ' + e.message, 'err'); })
    .getInitialData();
};

// ---- AUTH ----
function switchTab(tab) {
  document.getElementById('tab-ql').classList.toggle('active', tab === 'manager');
  document.getElementById('tab-nv').classList.toggle('active', tab === 'employee');
  document.getElementById('form-manager').classList.toggle('hidden', tab !== 'manager');
  document.getElementById('form-emp').classList.toggle('hidden', tab !== 'employee');
}

function setLoginLoading(loading) {
  var btn = document.getElementById('btn-login');
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<div class="btn-spin"></div> Äang kiáŧm tra...'
    : 'ÄÄng nháš­p';
}

function doLogin() {
  var pw = document.getElementById('inp-pw').value;
  setLoginLoading(true);
  document.getElementById('err-pw').classList.add('hidden');
  google.script.run
    .withSuccessHandler(function(ok) {
      setLoginLoading(false);
      if (ok) { APP.role = 'manager'; APP.user = {name:'QuášĢn lÃ―', role:'manager'}; enterApp(); }
      else { document.getElementById('err-pw').classList.remove('hidden'); }
    })
    .withFailureHandler(function(e){ setLoginLoading(false); toast(e.message,'err'); })
    .verifyManagerPassword(pw);
}

function doLoginEmp() {
  var id = document.getElementById('sel-emp').value;
  if (!id) { document.getElementById('err-emp').classList.remove('hidden'); return; }
  APP.role = 'employee';
  APP.user = APP.user_by_id(id);
  enterApp();
}

function enterApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sb-name').textContent = APP.user.name;
  var menu = APP.role === 'manager'
    ? [{id:'dashboard',icon:'ð',lbl:'Dashboard'},{id:'jobs',icon:'ð',lbl:'CÃīng viáŧc'},{id:'tasks',icon:'ð',lbl:'Äáš§u viáŧc'},{id:'settings',icon:'âïļ',lbl:'CÃ i Äáš·t'}]
    : [{id:'mytasks',icon:'â',lbl:'Viáŧc cáŧ§a tÃīi'}];
  document.getElementById('sb-nav').innerHTML = menu.map(function(m) {
    return '<div class="nav-item" id="nav-'+m.id+'" onclick="goTo(\''+m.id+'\')"><span>'+m.icon+'</span>'+m.lbl+'</div>';
  }).join('');
  goTo(APP.role === 'manager' ? 'dashboard' : 'mytasks');
}

function doLogout() {
  APP.role = null; APP.user = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('inp-pw').value = '';
}

function goTo(page) {
  APP.page = page;
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  var n = document.getElementById('nav-'+page); if(n) n.classList.add('active');
  document.querySelectorAll('#main > div').forEach(function(el){ el.classList.add('hidden'); });
  var pg = document.getElementById('pg-'+page); if(pg) pg.classList.remove('hidden');
  if (page === 'dashboard') renderDashboard();
  else if (page === 'jobs') renderJobs();
  else if (page === 'tasks') renderAllTasks();
  else if (page === 'mytasks') renderMyTasks();
  else if (page === 'settings') renderSettings();
}

// ---- DASHBOARD ----
function defaultDashFilters() {
  var to   = new Date();
  var from = new Date(); from.setDate(from.getDate() - 90);
  return { dateFrom: from.toISOString().split('T')[0], dateTo: to.toISOString().split('T')[0], category: '' };
}
var _dashFilters = defaultDashFilters();

function renderDashboard() {
  var el = document.getElementById('pg-dashboard');
  // Filter bar (render ngay, khÃīng cáš§n ÄáŧĢi server)
  var cats = APP.categories || [];
  var filterBar = '<div style="background:#fff;border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.06)">';
  filterBar += '<span style="font-size:.85rem;font-weight:600;color:#555">Láŧc:</span>';
  filterBar += '<div style="display:flex;align-items:center;gap:6px;font-size:.85rem"><label style="color:#888">TáŧŦ</label><input type="date" id="d-from" value="'+esc(_dashFilters.dateFrom)+'" style="width:140px;padding:6px 10px;font-size:.83rem" onchange="_dashFilters.dateFrom=this.value;loadDashboard()"></div>';

function renderDAG(tasks, tst) {
  if (!tasks || !tasks.length) return '';
  var sorted = tasks.slice().sort(function(a,b){ return Number(a.order)-Number(b.order); });

  var nodes = sorted.map(function(t) {
    var st = tst.filter(function(s){ return s.id===t.status_id; })[0];
    var stLabel = st ? st.label : '';
    var nl = (stLabel||'').toLowerCase().replace(/\s/g,'');
    var cls = 'todo', icon = 'â';
    if (nl==='hoÃ nthanh'||nl==='ÄÃĢxong')    { cls='done';        icon='â'; }
    else if (nl==='ÄanglÃ m')                { cls='in_progress'; icon='âģ'; }
    else if (nl==='treo')                   { cls='pending';     icon='âļ'; }
    else if (nl==='táŧŦcháŧi'||nl==='reject')  { cls='rejected';    icon='â'; }
    var asgn = APP.user_by_id(t.assignee_id);
    var asgnName = asgn ? asgn.name : 'â';
    return '<div class="dag-node" title="'+(stLabel||'ChÆ°a lÃ m')+' Â· '+asgnName+'">'
      + '<div class="dag-box '+cls+'">'
      +   '<div class="dag-icon">'+icon+'</div>'
      +   '<div class="dag-name">'+esc(t.name||'â')+'</div>'
      +   '<div class="dag-assignee">'+esc(asgnName)+'</div>'
      + '</div>'
      + '<div class="dag-order">#'+( t.order||'?')+'</div>'
      + '</div>';
  });

  var parts = [];
  nodes.forEach(function(n, i) {
    parts.push(n);
    if (i < nodes.length-1) parts.push('<div class="dag-arrow">â</div>');
  });

  return '<div class="dag-wrap"><div class="dag-flow">'+parts.join('')+'</div></div>';
}

    html += '<div class="task-meta">'+esc(asgn?asgn.name:'ChÆ°a phÃĒn cÃīng')+' Â· '+(dl?fmtDate(dl):'Theo job')+(t.notes?' Â· '+esc(t.notes):'')+'</div></div>';

function handleUpload(input, type, id, gridId) {

      .withSuccessHandler(function(img) {

function renderTasksContent() {
  var el2 = document.getElementById('tasks-content');
  if (!el2) return;
  var tasks = _allTasksCache;
  var tst = APP.stList('task');
  var norm = function(s){ return (s||'').toLowerCase().replace(/\s/g,''); };

  // Group by status, priority order
  var order = { 'ÄanglÃ m':1, 'chÆ°alÃ m':2, 'treo':3, 'hoÃ nthanh':4, 'ÄÃĢxong':4 };
  var groups = {};
  tst.forEach(function(s){ groups[s.id] = { status: s, items: [] }; });

  tasks.forEach(function(t){
    // Báŧ qua task cáŧ§a job khÃīng cÃģ tasks configured (job.task_count === 0 khÃīng tháŧ xášĢy ra vÃŽ task nÃ y táŧn tášĄi)
    if (!t.job) return;
    if (groups[t.status_id]) groups[t.status_id].items.push(t);
  });

  var sortedGroups = Object.values(groups)
    .filter(function(g){ return g.items.length > 0; })
    .sort(function(a,b){
      var oa = a.status ? (order[norm(a.status.label)]||5) : 5;
      var ob = b.status ? (order[norm(b.status.label)]||5) : 5;

    });

  if (!sortedGroups.length) { el2.innerHTML = '<div class="empty">KhÃīng cÃģ task nÃ o</div>'; return; }

  var html = '';
  sortedGroups.forEach(function(g) {
    var s = g.status;
    var sid = s ? s.id : '__none';
    var color = s ? s.color : '#9E9E9E';
    var isActive = s && (norm(s.label) === 'ÄanglÃ m');
    var page = _taskPages[sid] || 1;
    var pageSize = isActive ? g.items.length : _taskPageSize; // Äang lÃ m: hiáŧn tášĨt cášĢ
    var total = g.items.length;
    var totalPages = Math.ceil(total / pageSize);
    var pageItems = isActive ? g.items : g.items.slice((page-1)*pageSize, page*pageSize);

    html += '<div style="margin-bottom:24px">';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">';
    html += '<span style="width:12px;height:12px;border-radius:50%;background:'+color+';display:inline-block"></span>';

    html += '<span class="chip">'+total+'</span></div>';

    pageItems.forEach(function(t) {
      var dl = t.effective_deadline;
      var isDone = s && (norm(s.label)==='hoÃ nthanh'||norm(s.label)==='ÄÃĢxong');
      var over = dl && new Date(dl) < new Date() && !isDone;
      var daysLeft = dl ? Math.ceil((new Date(dl)-new Date())/86400000) : null;
      html += '<tr>';
      html += '<td><strong>'+esc(t.name||'â')+'</strong></td>';
      html += '<td><div style="font-size:.85rem;font-weight:500">'+esc(t.job?t.job.code:'â')+'</div><div style="font-size:.78rem;color:#aaa">'+esc(t.job?t.job.name:'')+'</div></td>';
      html += '<td>'+(t.assignee?'<span style="font-size:.85rem">'+esc(t.assignee.name)+'</span>':'<span style="color:#ccc;font-size:.82rem">ChÆ°a phÃĒn cÃīng</span>')+'</td>';
      html += '<td>'+(dl

          +(over?'<div style="font-size:.75rem;color:#e94560">quÃĄ '+Math.abs(daysLeft)+' ngÃ y</div>'
          :daysLeft!==null&&daysLeft>=0&&daysLeft<=3?'<div style="font-size:.75rem;color:#FF9800">cÃēn '+daysLeft+' ngÃ y</div>':'')
        :'<span style="color:#ccc">â</span>')+'</td>';
      html += '<td style="font-size:.82rem;color:#888;max-width:180px">'+esc(t.notes||'')+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';

    // Pagination controls
    if (!isActive && totalPages > 1) {

// ---- MODAL ----
function showModal(html) {
  document.getElementById('modal-wrap').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>';
}
function showModalLg(html) {
  document.getElementById('modal-wrap').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal modal-lg">'+html+'</div></div>';
}
function setModal(html) {
  var m = document.querySelector('.modal');
  if (m) m.innerHTML = html;
}
function closeModal() { document.getElementById('modal-wrap').innerHTML = ''; }

// ---- TOAST ----
function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(function(){ el.remove(); }, 3000);
}

// ---- UTILS ----
function gv(id) { var e=document.getElementById(id); return e?e.value:''; }
function spinner() { return '<div class="spin-wrap"><div class="spin"></div> Äang tášĢi...</div>'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtDate(d) { if(!d) return ''; var dt=new Date(d); return isNaN(dt)?String(d):dt.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateInput(d) { if(!d) return ''; var dt=new Date(d); return isNaN(dt)?'':dt.toISOString().split('T')[0]; }
