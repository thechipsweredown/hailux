<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base target="_top">
<title>HaiLux</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none;border:1px solid #ddd;border-radius:6px;padding:8px 12px;width:100%}
input:focus,select:focus,textarea:focus{border-color:#4361ee}
.hidden{display:none!important}
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
#main{margin-left:220px;flex:1;padding:24px}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo h2{font-size:1.3rem;font-weight:700;color:#e94560}
.sidebar-logo p{font-size:.75rem;color:#aaa;margin-top:2px}
.sidebar-user{padding:12px 20px;font-size:.85rem;color:#ccc;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-user strong{color:#fff;display:block}
nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#bbb;font-size:.9rem;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(233,69,96,.15);color:#e94560;border-left-color:#e94560}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.btn-logout{background:rgba(255,255,255,.08);color:#ccc;padding:8px 16px;border-radius:6px;font-size:.85rem;width:100%}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:2rem;font-weight:800;color:#e94560}
.login-logo p{color:#888;font-size:.9rem;margin-top:4px}
.login-tabs{display:flex;margin-bottom:24px;border:1px solid #eee;border-radius:8px;overflow:hidden}
.login-tab{flex:1;padding:10px;text-align:center;font-size:.9rem;color:#888;cursor:pointer;transition:.2s}
.login-tab.active{background:#e94560;color:#fff;font-weight:600}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:#555;margin-bottom:6px}
.btn-primary{background:#e94560;color:#fff;padding:12px;border-radius:8px;font-size:1rem;font-weight:600;width:100%;margin-top:8px}
.login-error{color:#e94560;font-size:.85rem;margin-top:8px;text-align:center}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-size:1.5rem;font-weight:700;color:#1a1a2e}
.page-header .sub{font-size:.9rem;color:#888;margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #4361ee}
.stat-card.red{border-left-color:#e94560}
.stat-card.green{border-left-color:#4CAF50}
.stat-card.orange{border-left-color:#FF9800}
.stat-card.blue{border-left-color:#2196F3}
.stat-val{font-size:2rem;font-weight:700}
.stat-lbl{font-size:.85rem;color:#888;margin-top:4px}
.stat-sub{font-size:.8rem;color:#aaa;margin-top:2px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;margin-bottom:20px}
.card-toolbar{padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid #f0f0f0}
.card-body{padding:20px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:#f8f9ff}
th{padding:12px 16px;text-align:left;font-size:.82rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 16px;font-size:.9rem;border-top:1px solid #f5f5f5;vertical-align:middle}
tr:hover td{background:#fafbff}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:600}
.badge-red{background:#ffeaea;color:#e94560}
.btn{padding:8px 16px;border-radius:8px;font-size:.88rem;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.2s}
.btn-sm{padding:5px 10px;font-size:.8rem;border-radius:6px}
.btn-blue{background:#4361ee;color:#fff}
.btn-green{background:#4CAF50;color:#fff}
.btn-outline{background:#fff;border:1px solid #ddd;color:#555}
.btn-outline:hover{border-color:#4361ee;color:#4361ee}
.btn-ghost{background:transparent;color:#888;padding:6px 10px;border-radius:6px}
.btn-ghost:hover{background:#f5f5f5}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:900px}
.modal-hd{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hd h3{font-size:1.1rem;font-weight:700}
.modal-bd{padding:24px;overflow-y:auto;flex:1}
.modal-ft{padding:16px 24px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.btn-x{background:none;font-size:1.3rem;color:#aaa;line-height:1}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.row1{grid-template-columns:1fr;margin-bottom:16px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.fg label{display:block;font-size:.83rem;font-weight:600;color:#555;margin-bottom:5px}
.fg{margin-bottom:0}
textarea{resize:vertical;min-height:80px}
.hint{font-size:.78rem;color:#aaa;margin-top:4px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.detail-box{background:#f8f9ff;border-radius:10px;padding:16px}
.detail-box h4{font-size:.85rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.detail-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.88rem}
.detail-row .lbl{color:#888}
.detail-row .val{font-weight:500;text-align:right;max-width:60%}
.task-item{background:#f8f9ff;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1px solid #eee}
.task-item:hover{border-color:#4361ee;background:#f0f4ff}
.task-num{width:28px;height:28px;border-radius:50%;background:#4361ee;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.task-info{flex:1}
.task-name{font-weight:600;font-size:.92rem}
.task-meta{font-size:.8rem;color:#888;margin-top:3px}
.task-acts{display:flex;gap:6px;flex-shrink:0}
.sec-title{font-size:1rem;font-weight:700;color:#1a1a2e;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.emp-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #ddd;cursor:pointer;transition:.2s}
.emp-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.emp-card.in-progress{border-left-color:#FF9800}
.emp-card.upcoming{border-left-color:#4361ee}
.emp-card.done{border-left-color:#4CAF50;opacity:.7}
.emp-card.blocked{opacity:.6}
.ec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ec-name{font-weight:600;font-size:.95rem}
.ec-job{font-size:.82rem;color:#888;margin-bottom:4px}
.ec-dl{font-size:.8rem;color:#888}
.ec-dl.over{color:#e94560;font-weight:600}
.imgs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:12px}
.img-th{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:#f0f0f0;cursor:pointer}
.img-th img{width:100%;height:100%;object-fit:cover}
.img-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;width:22px;height:22px;font-size:.7rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;border:none}
.img-th:hover .img-del{opacity:1}
.set-sec{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
.set-sec h3{font-size:1rem;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:.9rem}
.set-row:last-child{border-bottom:none}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag-it{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:.82rem;background:#f0f0f0;color:#333}
.tag-it .tdot{width:8px;height:8px;border-radius:50%}
.tag-it .rm{cursor:pointer;color:#aaa;font-size:.9rem}
.tag-it .rm:hover{color:#e94560}
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:.88rem;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.ok{border-left:4px solid #4CAF50}
.toast.err{border-left:4px solid #e94560}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:40px;color:#aaa;gap:8px}
.spin{width:20px;height:20px;border:2px solid #eee;border-top-color:#4361ee;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.money{font-family:monospace;font-weight:600}
.empty{text-align:center;padding:40px;color:#aaa}
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:.8rem;background:#f0f2f5;color:#555}
.divider{height:1px;background:#f0f0f0;margin:16px 0}
.muted{color:#aaa;font-size:.85rem}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><h1>HaiLux</h1><p>Hل»‡ thل»‘ng quل؛£n lأ½ cأ´ng viل»‡c</p></div>
    <div class="login-tabs">
      <div class="login-tab active" id="tab-ql" onclick="switchTab('manager')">Quل؛£n lأ½</div>
      <div class="login-tab" id="tab-nv" onclick="switchTab('employee')">Nhأ¢n viأھn</div>
    </div>
    <div id="form-manager">
      <div class="form-group"><label>Mل؛­t khل؛©u</label><input type="password" id="inp-pw" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-primary" onclick="doLogin()">ؤگؤƒng nhل؛­p</button>
      <p class="login-error hidden" id="err-pw">Mل؛­t khل؛©u khأ´ng ؤ‘أ؛ng</p>
    </div>
    <div id="form-emp" class="hidden">
      <div class="form-group"><label>Chل»چn tأھn cل»§a bل؛،n</label><select id="sel-emp"><option value="">-- Chل»چn nhأ¢n viأھn --</option></select></div>
      <button class="btn-primary" onclick="doLoginEmp()">Vأ o xem viل»‡c cل»§a tأ´i</button>
      <p class="login-error hidden" id="err-emp">Vui lأ²ng chل»چn tأھn</p>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="sidebar">
    <div class="sidebar-logo"><h2>HaiLux</h2><p>Quل؛£n lأ½ cأ´ng viل»‡c</p></div>
    <div class="sidebar-user"><span class="muted">ؤگؤƒng nhل؛­p vل»›i</span><strong id="sb-name">â€”</strong></div>
    <nav id="sb-nav"></nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="doLogout()">&#8592; ؤگؤƒng xuل؛¥t</button></div>
  </div>
  <div id="main">
    <div id="pg-dashboard" class="hidden"></div>
    <div id="pg-jobs" class="hidden"></div>
    <div id="pg-mytasks" class="hidden"></div>
    <div id="pg-settings" class="hidden"></div>
  </div>
</div>

<div id="modal-wrap"></div>
<div id="toast-wrap"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  toast('JS Error: ' + msg + ' (line ' + line + ')', 'err');
  console.error(msg, err);
};
window.addEventListener('unhandledrejection', function(e) {
  toast('Async Error: ' + (e.reason && e.reason.message || e.reason), 'err');
  console.error(e.reason);
});

var APP = {
  role: null,
  user: null,
  page: null,
  users: [], statuses: [], taskTemplates: [], settings: [], jobs: [],
  st: function(id) { return (this.statuses||[]).filter(function(s){return s.id===id;})[0] || null; },
  stBy: function(type, label) { return (this.statuses||[]).filter(function(s){return s.entity_type===type&&s.label===label;})[0] || null; },
  stList: function(type) { return (this.statuses||[]).filter(function(s){return s.entity_type===type;}); },
  user_by_id: function(id) { return (this.users||[]).filter(function(u){return u.id===id;})[0] || null; },
  emps: function() { return (this.users||[]).filter(function(u){return u.role==='employee';}); }
};

// ---- INIT ----
window.onload = function() {
  google.script.run
    .withSuccessHandler(function(d) {
      APP.users = d.users || [];
      APP.statuses = d.statuses || [];
      APP.taskTemplates = d.taskTemplates || [];
      APP.settings = d.settings || [];
      var sel = document.getElementById('sel-emp');
      APP.emps().forEach(function(u) {
        var o = document.createElement('option');
        o.value = u.id; o.textContent = u.name; sel.appendChild(o);
      });
    })
    .withFailureHandler(function(e){ toast('Lل»—i kل؛؟t nل»‘i: ' + e.message, 'err'); })
    .getInitialData();
};

// ---- AUTH ----
function switchTab(tab) {
  document.getElementById('tab-ql').classList.toggle('active', tab === 'manager');
  document.getElementById('tab-nv').classList.toggle('active', tab === 'employee');
  document.getElementById('form-manager').classList.toggle('hidden', tab !== 'manager');
  document.getElementById('form-emp').classList.toggle('hidden', tab !== 'employee');
}

function doLogin() {
  var pw = document.getElementById('inp-pw').value;
  google.script.run
    .withSuccessHandler(function(ok) {
      if (ok) { APP.role = 'manager'; APP.user = {name:'Quل؛£n lأ½', role:'manager'}; enterApp(); }
      else { document.getElementById('err-pw').classList.remove('hidden'); }
    })
    .withFailureHandler(function(e){ toast(e.message,'err'); })
    .verifyManagerPassword(pw);
}

function doLoginEmp() {
  var id = document.getElementById('sel-emp').value;
  if (!id) { document.getElementById('err-emp').classList.remove('hidden'); return; }
  APP.role = 'employee';
  APP.user = APP.user_by_id(id);
  enterApp();
}

function enterApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sb-name').textContent = APP.user.name;
  var menu = APP.role === 'manager'
    ? [{id:'dashboard',icon:'ًں“ٹ',lbl:'Dashboard'},{id:'jobs',icon:'ًں‘œ',lbl:'Cأ´ng viل»‡c'},{id:'settings',icon:'âڑ™ï¸ڈ',lbl:'Cأ i ؤ‘ل؛·t'}]
    : [{id:'mytasks',icon:'âœ…',lbl:'Viل»‡c cل»§a tأ´i'}];
  document.getElementById('sb-nav').innerHTML = menu.map(function(m) {
    return '<div class="nav-item" id="nav-'+m.id+'" onclick="goTo(\''+m.id+'\')"><span>'+m.icon+'</span>'+m.lbl+'</div>';
  }).join('');
  goTo(APP.role === 'manager' ? 'dashboard' : 'mytasks');
}

function doLogout() {
  APP.role = null; APP.user = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('inp-pw').value = '';
}

function goTo(page) {
  APP.page = page;
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  var n = document.getElementById('nav-'+page); if(n) n.classList.add('active');
  document.querySelectorAll('#main > div').forEach(function(el){ el.classList.add('hidden'); });
  var pg = document.getElementById('pg-'+page); if(pg) pg.classList.remove('hidden');
  if (page === 'dashboard') renderDashboard();
  else if (page === 'jobs') renderJobs();
  else if (page === 'mytasks') renderMyTasks();
  else if (page === 'settings') renderSettings();
}

// ---- DASHBOARD ----
function renderDashboard() {
  var el = document.getElementById('pg-dashboard');
  el.innerHTML = spinner();
  google.script.run
    .withSuccessHandler(function(s) {
      var fmt = function(n){ return Number(n).toLocaleString('vi-VN')+'ؤ‘'; };
      var html = '<div class="page-header"><div><h1>Dashboard</h1><p class="sub">Tل»•ng quan cأ´ng viل»‡c</p></div></div>';
      html += '<div class="stats-grid">';
      html += '<div class="stat-card blue"><div class="stat-val">'+s.jobs.total+'</div><div class="stat-lbl">Tل»•ng sل»‘ Job</div><div class="stat-sub">'+s.jobs.overdue+' quأ، hل؛،n</div></div>';
      html += '<div class="stat-card orange"><div class="stat-val">'+s.tasks.total+'</div><div class="stat-lbl">Tل»•ng sل»‘ Task</div><div class="stat-sub">'+(s.tasks.by_status['ؤگang lأ m']||0)+' ؤ‘ang lأ m</div></div>';
      html += '<div class="stat-card green"><div class="stat-val money">'+fmt(s.revenue.total)+'</div><div class="stat-lbl">Tل»•ng doanh thu</div><div class="stat-sub money">'+fmt(s.revenue.completed)+' hoأ n thأ nh</div></div>';
      html += '<div class="stat-card red"><div class="stat-val">'+s.jobs.overdue+'</div><div class="stat-lbl">Job quأ، hل؛،n</div><div class="stat-sub">Cل؛§n xل»­ lأ½ ngay</div></div>';
      html += '</div>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">';
      html += '<div class="card"><div class="card-body"><h3 style="font-size:.95rem;font-weight:700;margin-bottom:14px">Trل؛،ng thأ،i Job</h3>';
      Object.keys(s.jobs.by_status).forEach(function(lbl) {
        var st = APP.stList('job').filter(function(x){ return x.label===lbl; })[0];
        html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5"><span style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:'+(st?st.color:'#ccc')+';display:inline-block"></span>'+lbl+'</span><strong>'+s.jobs.by_status[lbl]+'</strong></div>';
      });
      html += '</div></div>';
      html += '<div class="card"><div class="card-body"><h3 style="font-size:.95rem;font-weight:700;margin-bottom:14px">Trل؛،ng thأ،i Task</h3>';
      Object.keys(s.tasks.by_status).forEach(function(lbl) {
        var st = APP.stList('task').filter(function(x){ return x.label===lbl; })[0];
        html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5"><span style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:'+(st?st.color:'#ccc')+';display:inline-block"></span>'+lbl+'</span><strong>'+s.tasks.by_status[lbl]+'</strong></div>';
      });
      html += '</div></div></div>';
      html += '<div class="card"><div class="card-toolbar"><strong>Thل»‘ng kأھ nhأ¢n viأھn</strong></div><div class="tbl-wrap"><table><thead><tr><th>Nhأ¢n viأھn</th><th>Tل»•ng</th><th>ؤگang lأ m</th><th>Chئ°a lأ m</th><th>Hoأ n thأ nh</th></tr></thead><tbody>';
      s.employees.forEach(function(e) {
        html += '<tr><td><strong>'+e.name+'</strong></td><td>'+e.total+'</td><td><span class="badge" style="background:#fff3e0;color:#FF9800">'+e.in_progress+'</span></td><td>'+e.todo+'</td><td><span class="badge" style="background:#e8f5e9;color:#4CAF50">'+e.done+'</span></td></tr>';
      });
      html += '</tbody></table></div></div>';
      el.innerHTML = html;
    })
    .withFailureHandler(function(e){ el.innerHTML = '<p class="empty">Lل»—i: '+e.message+'</p>'; })
    .getDashboardStats();
}

// ---- JOBS ----
var _jobs = [];
var _jobSearch = '', _jobStatus = '';

function renderJobs() {
  var el = document.getElementById('pg-jobs');
  el.innerHTML = spinner();
  google.script.run
    .withSuccessHandler(function(jobs) {
      _jobs = jobs || []; APP.jobs = _jobs;

function handleUpload(input, type, id, gridId) {
  var files = input.files;
  if (!files.length) return;
  var file = files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result.split(',')[1];
    toast('ؤگang tل؛£i ل؛£nh...');
    google.script.run
      .withSuccessHandler(function(img) {
        toast('ؤگأ£ tل؛£i ل؛£nh','ok');
        var grid = document.getElementById(gridId);
        if (grid) {
          var d = document.createElement('div');
          d.innerHTML = imgThumb(img, type, id, gridId);
          grid.appendChild(d.firstChild);
        }
        input.value = '';
        if (files.length > 1) handleUpload(input, type, id, gridId);
      })
      .withFailureHandler(function(er){ toast(er.message,'err'); })
      .uploadImage(b64, file.type, file.name, type, id, APP.user.name||'', '');
  };
  reader.readAsDataURL(file);
}

        if (!g.items.length) return;
        html += '<div class="sec-title"><span class="dot" style="background:'+g.dot+'"></span>'+g.lbl+' <span class="chip">'+g.items.length+'</span></div>';
        g.items.forEach(function(t) {
          var st = tst.filter(function(s){ return s.id===t.status_id; })[0];
          var dl = t.effective_deadline;
          var over = dl && new Date(dl)<new Date() && st && st.label!=='Hoأ n thأ nh';
          html += '<div class="emp-card '+key+'" onclick="openEmpTask(\''+t.id+'\')">';
          html += '<div class="ec-hd"><span class="ec-name">'+esc(t.name||'â€”')+'</span>';
          html += (st?'<span class="badge" style="background:'+st.color+'22;color:'+st.color+'">'+st.label+'</span>':'')+'</div>';
          html += '<div class="ec-job">'+esc((t.job&&t.job.code)||'')+' '+ esc((t.job&&t.job.name)||'â€”')+'</div>';
          html += '<div class="ec-dl'+(over?' over':'')+'">'+( dl?fmtDate(dl):'Khأ´ng cأ³ deadline')+(over?' آ· Quأ، hل؛،n':'')+(t.prev_task?' آ· Sau: '+esc(t.prev_task.name):'')+'</div>';
          html += '</div>';
        });
      });
      if (!tasks.length) html += '<div class="empty" style="margin-top:60px">Khأ´ng cأ³ task nأ o ؤ‘ئ°ل»£c giao</div>';
      el.innerHTML = html;
    })
    .withFailureHandler(function(e){ el.innerHTML = '<p class="empty">Lل»—i: '+e.message+'</p>'; })
    .getEnrichedTasksForAssignee(APP.user.id);
}

function openEmpTask(taskId) {

      var t = data.task, imgs = data.images;
      var tst = APP.stList('task');
      var st = tst.filter(function(s){ return s.id===t.status_id; })[0];
      var doneS = tst.filter(function(s){ return s.label==='Hoأ n thأ nh'; })[0];
      var ipS = tst.filter(function(s){ return s.label==='ؤگang lأ m'; })[0];
      var html = '<div class="modal-hd"><h3>'+esc(t.name)+'</h3><button class="btn-x" onclick="closeModal()">âœ•</button></div>';
      html += '<div class="modal-bd">';
      html += (st?'<div style="margin-bottom:16px"><span class="badge" style="background:'+st.color+'22;color:'+st.color+';font-size:.9rem;padding:6px 14px">'+st.label+'</span></div>':'');
      html += (t.notes?'<div class="detail-box" style="margin-bottom:16px"><h4>Ghi chأ؛ tل»« quل؛£n lأ½</h4><p style="font-size:.88rem;white-space:pre-line">'+esc(t.notes)+'</p></div>':'');
      html += '<div class="divider"></div>';
      html += '<div class="fg" style="margin-bottom:16px"><label>Ghi chأ؛ khi lأ m</label><textarea id="emp-notes" placeholder="Ghi lل؛،i vل؛¥n ؤ‘ل»پ, lئ°u أ½...">'+esc(t.notes||'')+'</textarea></div>';
      html += '<div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><strong>ل؛¢nh evidence ('+imgs.length+')</strong><button class="btn btn-sm btn-outline" onclick="document.getElementById(\'euf-'+taskId+'\').click()">+ Tل؛£i ل؛£nh</button></div>';
      html += '<input type="file" id="euf-'+taskId+'" accept="image/*" multiple style="display:none" onchange="handleUpload(this,\'task\',\''+taskId+'\',\'ei-'+taskId+'\')">';
      html += '<div class="imgs-grid" id="ei-'+taskId+'">';
      imgs.forEach(function(img){ html += imgThumb(img,'task',taskId,'ei-'+taskId); });
      html += '</div></div></div>';
      html += '<div class="modal-ft" style="justify-content:space-between"><button class="btn btn-outline" onclick="closeModal()">ؤگأ³ng</button><div style="display:flex;gap:8px">';
      if (ipS && st && st.label!=='ؤگang lأ m' && st.label!=='Hoأ n thأ nh') html += '<button class="btn btn-outline" style="border-color:#FF9800;color:#FF9800" onclick="empUpdStatus(\''+taskId+'\',\''+ipS.id+'\',\''+t.job_id+'\')">Bل؛¯t ؤ‘ل؛§u</button>';
      if (doneS && st && st.label!=='Hoأ n thأ nh') html += '<button class="btn btn-green" onclick="empUpdStatus(\''+taskId+'\',\''+doneS.id+'\',\''+t.job_id+'\')">Hoأ n thأ nh</button>';
      html += '<button class="btn btn-blue" onclick="empSaveNotes(\''+taskId+'\',\''+t.job_id+'\')">Lئ°u</button>';
      html += '</div></div>';
      setModal(html);
    })
    .withFailureHandler(function(e){ setModal('<p class="empty">Lل»—i: '+e.message+'</p>'); })
    .getTaskWithImages(taskId);
}

function empUpdStatus(taskId, statusId, jobId) {
  google.script.run
    .withSuccessHandler(function(){ toast('ؤگأ£ cل؛­p nhل؛­t','ok'); closeModal(); renderMyTasks(); })
    .withFailureHandler(function(e){ toast(e.message,'err'); })
    .updateTask(taskId, {status_id: statusId, job_id: jobId});
}

function empSaveNotes(taskId, jobId) {
  var notes = gv('emp-notes');
  google.script.run
    .withSuccessHandler(function(){ toast('ؤگأ£ lئ°u','ok'); closeModal(); })
    .withFailureHandler(function(e){ toast(e.message,'err'); })
    .updateTask(taskId, {notes: notes, job_id: jobId});
}

      });

      html += '<div class="set-sec"><h3>Trل؛،ng thأ،i Job</h3><div class="tag-list">';
      jst.forEach(function(s){ html += '<div class="tag-it"><span class="tdot" style="background:'+s.color+'"></span>'+esc(s.label)+'<span class="rm" onclick="delStatus(\''+s.id+'\')">âœ•</span></div>'; });
      html += '</div><div style="display:flex;gap:8px;margin-top:10px;align-items:center"><input id="new-jst-lbl" placeholder="Tأھn trل؛،ng thأ،i..." style="max-width:160px"><input type="color" id="new-jst-col" value="#607D8B" style="width:40px;padding:2px;border-radius:4px"><button class="btn btn-sm btn-outline" onclick="addStatus(\'job\')">+ Thأھm</button></div></div>';

      html += '</div><div style="display:flex;gap:8px;margin-top:10px;align-items:center"><input id="new-tst-lbl" placeholder="Tأھn trل؛،ng thأ،i..." style="max-width:160px"><input type="color" id="new-tst-col" value="#607D8B" style="width:40px;padding:2px;border-radius:4px"><button class="btn btn-sm btn-outline" onclick="addStatus(\'task\')">+ Thأھm</button></div></div>';
      html += '<div class="set-sec"><h3>Mل؛«u Task</h3><div class="tag-list">';

function changePw() { var pw=gv('new-pw'); if(!pw) return; google.script.run.withSuccessHandler(function(){ toast('ؤگأ£ ؤ‘ل»•i mل؛­t khل؛©u','ok'); document.getElementById('new-pw').value=''; }).withFailureHandler(function(e){toast(e.message,'err');}).updateSetting('manager_password',pw); }
function addUser() { var n=gv('new-uname').trim(); if(!n) return; google.script.run.withSuccessHandler(function(){ toast('ؤگأ£ thأھm','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).createUser({name:n,role:'employee'}); }
function delUser(id) { if(!confirm('Xأ³a nhأ¢n viأھn nأ y?')) return; google.script.run.withSuccessHandler(function(){ toast('ؤگأ£ xأ³a','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).deleteUser(id); }
function toggleRole(id, name, role) { google.script.run.withSuccessHandler(function(){ toast('ؤگأ£ cل؛­p nhل؛­t','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).updateUser(id,{role:role==='manager'?'employee':'manager'}); }
function addStatus(type) { var l=gv('new-'+type+'st-lbl').trim(); if(!l) return; var c=gv('new-'+type+'st-col'); google.script.run.withSuccessHandler(function(){ toast('ؤگأ£ thأھm','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).createStatus({entity_type:type,label:l,color:c,order:99}); }
function delStatus(id) { if(!confirm('Xأ³a trل؛،ng thأ،i?')) return; google.script.run.withSuccessHandler(function(){ toast('ؤگأ£ xأ³a','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).deleteStatus(id); }
function addTmpl() { var n=gv('new-tmpl').trim(); if(!n) return; google.script.run.withSuccessHandler(function(){ toast('ؤگأ£ thأھm','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).createTaskTemplate({name:n}); }
function delTmpl(id) { google.script.run.withSuccessHandler(function(){ toast('ؤگأ£ xأ³a','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).deleteTaskTemplate(id); }
function runSetup() { google.script.run.withSuccessHandler(function(r){ toast(r,'ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).setupSheets(); }

// ---- MODAL ----
function showModal(html) {
  document.getElementById('modal-wrap').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>';
}
function showModalLg(html) {
  document.getElementById('modal-wrap').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal modal-lg">'+html+'</div></div>';
}
function setModal(html) {
  var m = document.querySelector('.modal');
  if (m) m.innerHTML = html;
}
function closeModal() { document.getElementById('modal-wrap').innerHTML = ''; }

// ---- TOAST ----
function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(function(){ el.remove(); }, 3000);
}

// ---- UTILS ----
function gv(id) { var e=document.getElementById(id); return e?e.value:''; }
function spinner() { return '<div class="spin-wrap"><div class="spin"></div> ؤگang tل؛£i...</div>'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtDate(d) { if(!d) return ''; var dt=new Date(d); return isNaN(dt)?String(d):dt.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateInput(d) { if(!d) return ''; var dt=new Date(d); return isNaN(dt)?'':dt.toISOString().split('T')[0]; }
